{% extends "base.html" %}

{% block title %}Add Expense — Spendly{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-page-inner">

        <div class="page-header">
            <div>
                <h1 class="page-title">Add Expense</h1>
                <p class="page-subtitle">Record a new transaction.</p>
            </div>
        </div>

        <div class="form-card">
            <form method="POST" action="{{ url_for('add_expense') }}">

                <div class="form-row">
                    <div class="form-group">
                        <label for="amount">Amount (₹)</label>
                        <input type="number" id="amount" name="amount" step="0.01" min="0.01"
                               class="form-input" placeholder="0.00"
                               value="{{ form_data.amount if form_data else '' }}"
                               required autofocus>
                    </div>
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" name="date"
                               class="form-input"
                               value="{{ form_data.date if form_data else today }}"
                               required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-select" required>
                        <option value="" disabled {% if not form_data or not form_data.category %}selected{% endif %}>Select a category</option>
                        {% for cat in categories %}
                        <option value="{{ cat }}" {% if form_data and form_data.category == cat %}selected{% endif %}>{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="description">Description <span class="label-optional">(optional)</span></label>
                    <input type="text" id="description" name="description"
                           class="form-input" placeholder="e.g. Lunch at office"
                           value="{{ form_data.description if form_data else '' }}">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit" style="flex:1">Save Expense</button>
                    <a href="{{ url_for('dashboard') }}" class="btn-back">Cancel</a>
                </div>

            </form>
        </div>

    </div>
</div>
{% endblock %}
